<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>本周学习计划 · PDF 预览</title>
<style>
:root{--ink:#28483a;--muted:#68736c;--line:#d9d5cb;--paper:#fff;--soft:#f6f5f0;--accent:#3f765c}
*{box-sizing:border-box}html,body{margin:0;background:#e9ece8;color:var(--ink);font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif}.toolbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 22px;background:#fff;border-bottom:1px solid #d8ddd8;box-shadow:0 3px 16px rgba(34,52,43,.10)}.toolbar strong{font-size:15px}.toolbar-actions{display:flex;gap:8px}.btn{border:1px solid #aebbb4;background:#fff;color:#294f3e;border-radius:9px;padding:9px 15px;font:inherit;font-weight:700;cursor:pointer}.btn.primary{background:#315f49;color:#fff;border-color:#315f49}.hint{font-size:12px;color:#68736c}.preview{padding:22px}.sheet{width:297mm;min-height:210mm;margin:0 auto 22px;background:var(--paper);box-shadow:0 8px 30px rgba(36,52,43,.18);padding:10mm;display:flex;flex-direction:column;page-break-after:always}.sheet:last-child{page-break-after:auto}.header{display:grid;grid-template-columns:minmax(0,1fr) 74mm;gap:10mm;align-items:end;border-bottom:1.2px solid #cfd8d2;padding-bottom:5mm;margin-bottom:5mm}.brand{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:#718077;font-weight:800}.title{font-family:Georgia,"Songti SC",serif;font-size:27px;line-height:1.1;margin:3px 0 4px}.date-range{font-size:12px;color:var(--muted)}.progress-box{border:1px solid #d7ddd8;border-radius:12px;padding:10px 12px;background:#fbfcfa}.progress-top{display:flex;justify-content:space-between;font-size:11px;font-weight:800;margin-bottom:7px}.track{height:7px;border-radius:99px;background:#dfe5e1;overflow:hidden}.track span{display:block;height:100%;background:var(--accent);border-radius:99px}.days{display:grid;gap:4mm;align-items:start;flex:1}.days.four{grid-template-columns:repeat(4,minmax(0,1fr))}.days.three{grid-template-columns:repeat(3,minmax(0,1fr))}.day{border:1px solid var(--line);border-radius:12px;background:#fdfcf8;overflow:hidden;min-width:0;break-inside:avoid}.day-head{padding:9px 10px;background:#edf4ef;border-bottom:1px solid #d6dfd9}.day-head h2{font-size:14px;margin:0}.day-head small{display:block;margin-top:2px;font-size:9px;color:#718077}.tasks{padding:8px;display:grid;gap:6px}.task{border:1px solid #dadfd9;border-radius:9px;background:#fff;padding:7px 8px;break-inside:avoid;min-width:0}.task.done{background:#f2f7f3;border-color:#cbdccf}.time{font-size:8px;letter-spacing:.03em;color:#758179;margin-bottom:3px;white-space:nowrap}.task-title{font-size:10.3px;font-weight:800;line-height:1.28;overflow-wrap:anywhere;word-break:normal}.notes{font-size:8px;color:#6b756f;line-height:1.3;margin-top:3px;overflow-wrap:anywhere}.status{float:right;font-size:9px;color:#3e755b;margin-left:5px}.empty{padding:14px 8px;text-align:center;color:#89918c;font-size:9px}.footer{display:flex;justify-content:space-between;gap:12px;margin-top:5mm;padding-top:3mm;border-top:1px solid #d8ddd9;color:#78827c;font-size:8px}.error{max-width:760px;margin:60px auto;padding:24px;background:#fff;border-radius:16px;box-shadow:0 8px 25px rgba(0,0,0,.12)}
@page{size:A4 landscape;margin:0}
@media print{html,body{background:#fff}.toolbar{display:none!important}.preview{padding:0}.sheet{margin:0;box-shadow:none;width:297mm;height:210mm;min-height:210mm;overflow:hidden;padding:9mm 10mm}.title{font-size:25px}.task-title{font-size:9.8px}.preview .sheet{page-break-after:always}.preview .sheet:last-child{page-break-after:auto}}
</style>
</head>
<body>
<div class="toolbar"><div><strong>PDF 预览</strong><div class="hint">A4 横向 · 任务卡片 · 自动分页</div></div><div class="toolbar-actions"><button class="btn" onclick="window.close()">关闭</button><button class="btn primary" onclick="window.print()">打印 / 保存为 PDF</button></div></div>
<main class="preview" id="preview"><div class="error">正在读取本周学习计划……</div></main>
<script>
const DAYS=['周一','周二','周三','周四','周五','周六','周日'];
let rendered=false;
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const minutes=s=>{const m=String(s||'').match(/(\d{1,2}):(\d{2})/);return m?Number(m[1])*60+Number(m[2]):9999};
function dateLabel(offset){const d=new Date();const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day+offset);return d.toLocaleDateString('zh-SG',{month:'2-digit',day:'2-digit'});}
function taskHtml(t){return `<article class="task ${t.done?'done':''}"><div class="time">${esc(t.start||'')} ${t.end?'– '+esc(t.end):''}<span class="status">${t.done?'✓':''}</span></div><div class="task-title">${esc(t.title||'未命名任务')}</div>${t.notes?`<div class="notes">${esc(t.notes)}</div>`:''}</article>`}
function pageHtml(dayNames,index,total,all,done,pct){const cls=dayNames.length===4?'four':'three';return `<section class="sheet"><header class="header"><div><div class="brand">Little Explorer Learning World · V7 LTS 1.0</div><div class="title">本周学习计划</div><div class="date-range">${dateLabel(0)} – ${dateLabel(6)} · 第 ${index+1} / ${total} 页</div></div><div class="progress-box"><div class="progress-top"><span>Completed ${done} / ${all.length}</span><span>${pct}%</span></div><div class="track"><span style="width:${pct}%"></span></div></div></header><div class="days ${cls}">${dayNames.map(day=>{const items=all.filter(x=>x.day===day).sort((a,b)=>minutes(a.start)-minutes(b.start));return `<section class="day"><div class="day-head"><h2>${day}</h2><small>${dateLabel(DAYS.indexOf(day))} · ${items.length} 项</small></div><div class="tasks">${items.length?items.map(taskHtml).join(''):'<div class="empty">暂无任务</div>'}</div></section>`}).join('')}</div><footer class="footer"><span>Generated by Little Explorer Learning World</span><span>${done} completed · ${all.length-done} remaining</span></footer></section>`}
function render(payload){if(rendered)return;rendered=true;const all=Array.isArray(payload?.week)?payload.week:[];const done=all.filter(x=>x.done).length;const pct=all.length?Math.round(done/all.length*100):0;const groups=[DAYS.slice(0,4),DAYS.slice(4)];document.getElementById('preview').innerHTML=groups.map((g,i)=>pageHtml(g,i,groups.length,all,done,pct)).join('');document.title=`本周学习计划 ${dateLabel(0)}-${dateLabel(6)}`;}
window.addEventListener('message',e=>{if(e.data&&e.data.type==='LEW_PLANNER_DATA')render(e.data.payload)});
window.addEventListener('load',()=>{try{window.opener?.postMessage({type:'LEW_PLANNER_READY'},'*')}catch(e){}setTimeout(()=>{if(!rendered)document.getElementById('preview').innerHTML='<div class="error"><h2>没有收到学习计划数据</h2><p>请关闭此页，回到 Learning World 后重新点击“导出 PDF”。</p></div>'},2500)});
</script>
</body>
</html>
